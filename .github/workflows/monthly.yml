name: monthly-data-and-deploy

on:
  schedule:
    - cron: '0 13 3 * *'      # 매월 3일 13:00 UTC (= 한국 22:00) 자동 갱신
  workflow_dispatch:           # 수동 실행 버튼
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pandas yfinance pyarrow

      - name: Fetch economic data (FRED + yfinance)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch.py

      - name: Build site (embed data into index.html)
        run: python build.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
