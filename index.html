<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>경기순환 체크리스트</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#1a1512; --bar:#15100d; --panel:#221b15; --panel2:#241c15; --line:#2b231c; --line2:#32281e;
    --txt:#e8dcc8; --mut:#a08f7d; --mut2:#8a7a68;
    --침체:#c97a62; --회복:#cfa75e; --확장:#8fb381; --둔화:#c89468;
    --yes:#8fb381; --no:#c97a62; --maybe:#a08f7d;
    --accent:#c89468;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:20;background:var(--bar);border-bottom:1px solid var(--line);padding:11px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700;display:flex;align-items:center;gap:9px}
  header h1::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--accent);display:inline-block;flex:none}
  .asof{color:var(--mut);font-size:12px}
  .tabs{display:flex;gap:4px;margin-left:auto}
  .tabs button{background:transparent;border:1px solid transparent;color:var(--mut);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
  .tabs button.on{background:var(--panel2);color:var(--txt);border-color:var(--line)}
  main{max-width:1180px;margin:0 auto;padding:18px}
  .banner{background:#2a2013;border:1px solid #5a4526;color:#cfa75e;padding:8px 12px;border-radius:8px;margin-bottom:14px;font-size:13px;display:none}
  .row{display:flex;gap:18px;align-items:flex-start}
  .col-main{flex:1;min-width:0}
  .col-side{width:340px;flex:none}
  @media(max-width:980px){.row{flex-direction:column}.col-side{width:100%}}

  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  select,input[type=month],input[type=text],textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 9px;font-family:inherit;font-size:13px}
  button.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  button.btn:hover{border-color:var(--mut2)}
  button.primary{background:#c89468;border-color:#d8a67e;color:#1a1512}
  button.primary:hover{background:#d8a67e}

  .ind{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .ind h3{margin:0 0 2px;font-size:15px;display:flex;align-items:center;gap:8px}
  .cat-tag{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .info{cursor:pointer;color:var(--mut);border:1px solid var(--line);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
  .tip{display:none;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:8px 0;font-size:12.5px;color:var(--mut)}
  .tip.show{display:block}
  .tip b{color:var(--txt)}
  .tip .pf{display:grid;grid-template-columns:54px 1fr;gap:3px 8px;margin-top:7px}
  .tip .pf .ph{font-weight:600}
  canvas{width:100%;height:160px;display:block;margin:8px 0 4px;cursor:crosshair}
  .lastval{margin-left:auto;font-size:13px;color:var(--txt)} .lastval small{color:var(--mut)} .lastval b{color:var(--accent)}
  .ind h3{justify-content:flex-start}
  .period{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--mut)}
  .pbtn{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:4px 9px;border-radius:6px;cursor:pointer;font-size:12px}
  .pbtn.on{background:#c89468;border-color:#c89468;color:#1a1512}
  .manual-note{background:#241c15;border:1px dashed #4a3a2a;border-radius:8px;padding:10px;color:#cfc2b0;font-size:12.5px;margin:8px 0}
  .ismrow{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px}
  .ismrow input{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 8px}
  .srcrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
  a.srcbtn{display:inline-block;background:#2b231c;border:1px solid #4a3a2a;color:#e8dcc8;text-decoration:none;padding:5px 10px;border-radius:7px;font-size:12px}
  a.srcbtn:hover{background:#32281e;border-color:#5a4636}
  .qs{margin-top:6px}
  .q{display:flex;gap:10px;align-items:flex-start;padding:7px 8px;border-radius:8px}
  .q:hover{background:var(--panel2)}
  .q.disagree{outline:1px solid #8fb381; outline-offset:-1px}
  .q input[type=checkbox]{margin-top:3px;width:17px;height:17px;flex:none;accent-color:var(--accent)}
  .q .qbody{flex:1;min-width:0}
  .phase-chip{font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;margin-right:6px;vertical-align:1px}
  .qtext{font-size:13px}
  .sug{font-size:11.5px;color:var(--mut);margin-top:2px}
  .sug .v{font-weight:700;margin-right:5px}
  .v.그렇다{color:var(--yes)} .v.아니다{color:var(--no)} .v.애매{color:var(--maybe)} .v.수동{color:var(--mut2)}
  .w2{font-size:10px;color:var(--mut2);border:1px solid var(--line);border-radius:4px;padding:0 4px;margin-left:6px}

  /* 집계 패널 */
  .agg{position:sticky;top:64px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .agg h3{margin:0 0 10px;font-size:14px}
  .scoregrid{display:grid;grid-template-columns:1fr auto auto auto;gap:6px 10px;align-items:center;font-size:13px}
  .scoregrid .hd{color:var(--mut);font-size:11px}
  .bar{height:9px;border-radius:5px;background:var(--panel2);overflow:hidden;margin-top:8px}
  .pname{font-weight:700}
  .pname.침체{color:var(--침체)} .pname.회복{color:var(--회복)} .pname.확장{color:var(--확장)} .pname.둔화{color:var(--둔화)}
  .catbox{margin-top:12px;font-size:12px} .catbox summary{cursor:pointer;color:var(--mut)}
  .cattbl{margin-top:8px;font-size:12px} .cattbl th,.cattbl td{padding:3px 6px} .cattbl .tot td{border-top:2px solid var(--mut2);font-weight:700}
  .cli-box{margin-top:14px;padding:10px;border-radius:9px;background:var(--panel2);font-size:12.5px}
  .match-ok{color:var(--yes);font-weight:700} .match-no{color:var(--no);font-weight:700}
  .big-prob{display:flex;gap:6px;margin:10px 0}
  .big-prob .pp{flex:1;text-align:center;background:var(--panel2);border-radius:8px;padding:8px 4px}
  .big-prob .pp .n{font-size:18px;font-weight:750}
  .big-prob .pp .l{font-size:11px;color:var(--mut)}

  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:right}
  th{color:var(--mut);font-weight:600;background:var(--panel2)}
  td.l,th.l{text-align:left}
  .hist-bar{display:flex;height:26px;border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .hist-bar span{display:block}
  .mono{font-variant-numeric:tabular-nums}
  .seg{margin-bottom:26px}
  .seg h3{font-size:14px;border-left:3px solid var(--accent);padding-left:8px;margin:0 0 10px}
  .lens{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .lens label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px}
  .lens textarea{width:100%;min-height:64px;resize:vertical}
  .chain-row{display:flex;gap:8px;margin-bottom:6px}
  .chain-row input{flex:1}
  .scn-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .scn-card .meta{font-size:11px;color:var(--mut)}
  .req{color:var(--침체)}
  .muted{color:var(--mut)}
  .disg-list{margin-top:10px}
  .disg-item{background:var(--panel2);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12.5px}
  .foottip{color:var(--mut2);font-size:11px;margin-top:6px}
  .pill{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:20px;padding:2px 9px;color:var(--mut)}
</style>
</head>
<body>
<header>
  <h1>경기순환 체크리스트</h1>
  <span class="asof" id="asof"></span>
  <div class="tabs">
    <button data-tab="check" class="on">월간 체크</button>
    <button data-tab="hist">히스토리</button>
    <button data-tab="scn">시나리오</button>
    <button data-tab="asset">자산군</button>
    <button id="syncBtn" title="기기 간 동기화 코드">동기화</button>
  </div>
</header>
<main>
  <div class="banner" id="banner"></div>
  <div id="tab-check"></div>
  <div id="tab-hist" style="display:none"></div>
  <div id="tab-scn" style="display:none"></div>
  <div id="tab-asset" style="display:none"></div>
</main>

const SUPA_KEY = 'sb_publishable_3vXShFC5dKvMqzUy1KkyGQ_sF0SzUY2';   // anon(공개) 키 — 노출돼도 안전, 보호는 코드 비밀성+RPC
const SYNC_RPC = SUPA_URL + '/rest/v1/rpc/';
const SYNC_HEAD = { apikey:SUPA_KEY, Authorization:'Bearer '+SUPA_KEY, 'Content-Type':'application/json' };
const CS = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
function genCode(){ const a=new Uint8Array(20); crypto.getRandomValues(a); let s=''; for(const b of a) s+=CS[b%CS.length]; return s.replace(/(.{5})(?=.)/g,'$1-'); }
const cleanCode = c => (c||'').replace(/[^0-9A-Za-z]/g,'');
async function syncRpc(fn, body){
  const r = await fetch(SYNC_RPC+fn,{method:'POST',headers:SYNC_HEAD,body:JSON.stringify(body)});
  if(!r.ok) throw new Error('sync/'+fn+' '+r.status);
  const t=await r.text(); return t?JSON.parse(t):null;
}
// 경기순환 데이터는 sync_id 에 'cyc:' 네임스페이스를 붙여 거래일지와 분리
async function syncPull(code){ const rows=await syncRpc('sync_pull',{p_sync_id:'cyc:'+cleanCode(code)}); return (Array.isArray(rows)&&rows[0])?rows[0]:null; }
async function syncPush(code,data){ return await syncRpc('sync_push',{p_sync_id:'cyc:'+cleanCode(code),p_data:data}); }

let SYNC_CODE = localStorage.getItem('cyc_sync_code') || '';
let ONLINE = false;                                        // Supabase 연결됨?
const STORE_DEFAULT = { records:{}, scenarios:[], asset_returns:null, ism:{} };
let STORE = {...STORE_DEFAULT};                             // 전체 데이터 한 덩어리
const asStore = o => Object.assign({}, JSON.parse(JSON.stringify(STORE_DEFAULT)), o||{});

function cacheStore(){ try{ localStorage.setItem('cyc_store', JSON.stringify(STORE)); }catch(e){} }
function loadCache(){ try{ const s=JSON.parse(localStorage.getItem('cyc_store')||'null'); if(s) STORE=asStore(s); }catch(e){} }

// 두 STORE 병합(동기화 충돌 방지): 다른 기기 기록을 잃지 않게 합침. 방금 저장한 local 우선.
function mergeStore(remote, local){
  const out = asStore({});
  out.records = Object.assign({}, remote.records||{}, local.records||{});  // 같은 월은 local(방금 저장) 우선, 나머진 양쪽 보존
  out.ism     = Object.assign({}, remote.ism||{},     local.ism||{});
  const byId={}; (remote.scenarios||[]).concat(local.scenarios||[]).forEach(s=>{ if(s&&s.id) byId[s.id]=s; }); // 박제 합집합
  out.scenarios = Object.values(byId);
  out.asset_returns = local.asset_returns || remote.asset_returns || null;
  return out;
}

async function initStore(){
  loadCache();
  if(!SYNC_CODE){ SYNC_CODE=genCode(); localStorage.setItem('cyc_sync_code',SYNC_CODE); }
  try{
    const row=await syncPull(SYNC_CODE); ONLINE=true;
    if(row && row.data){ STORE=mergeStore(row.data, STORE); cacheStore(); }  // 캐시와 서버 병합
    else { await syncPush(SYNC_CODE, STORE); }   // 새 코드면 현재(캐시) 내용을 올려둠
  }catch(e){ ONLINE=false; }
  if(STORE.asset_returns==null) STORE.asset_returns=APP_DATA.asset_returns||{};
  updateSyncBanner();
}
async function persistStore(){
  cacheStore();
  if(SYNC_CODE){
    try{
      const row=await syncPull(SYNC_CODE);          // 저장 직전 최신을 받아 병합 → 다른 기기 기록 안 잃음
      ONLINE=true;
      if(row && row.data) STORE=mergeStore(row.data, STORE);
      await syncPush(SYNC_CODE, STORE);
      cacheStore(); updateSyncBanner(); return true;
    }catch(e){ ONLINE=false; }
  }
  updateSyncBanner(); return false;
}
async function applyCode(code){   // 다른 기기 코드 입력 → 그 데이터 가져오기
  const c=cleanCode(code); if(c.length<10) { toast('코드가 올바르지 않습니다'); return; }
  try{
    const row=await syncPull(code); ONLINE=true;
    SYNC_CODE=code.replace(/(.{5})(?=.)/g,'$1-'); localStorage.setItem('cyc_sync_code',SYNC_CODE);
    STORE = row && row.data ? asStore(row.data) : STORE;
    if(STORE.asset_returns==null) STORE.asset_returns=APP_DATA.asset_returns||{};
    cacheStore(); toast('동기화 코드 적용 완료 — 데이터를 불러왔습니다');
    updateIsmSuggestions(); renderCheck(); await loadDraftOrRecord();
  }catch(e){ toast('불러오기 실패: '+e.message); }
}

// ---------- 차트(자체 canvas, 오프라인 동작) ----------
const CHART_WINDOWS = [['1년',12],['5년',60],['10년',120]];
let CHART_MONTHS = 60;          // 기본 5년
const CHARTS = [];              // {cv, ser, color}

function fmtVal(v, ser){
  if(v==null) return '-';
  const t=(ser&&ser.transform)||'';
  if(t==='claims4w') return Math.round(v).toLocaleString()+'건';
  if(t==='yoy')      return (v>=0?'+':'')+v.toFixed(1)+'%';
  if(t==='price')    return v.toLocaleString(undefined,{maximumFractionDigits:1});
  return v.toFixed(2);          // level (금리·심리지수 등)
}

function setupChart(cv, ser, color){
  CHARTS.push({cv, ser, color:color||'#c89468'});
  redrawChart(cv, ser, color, -1);
  cv.addEventListener('mousemove', e=>{
    const m=cv._meta; if(!m||!m.n) return;
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    let idx=Math.round((mx-m.padL)/((m.W-m.padL-m.padR)||1)*(m.n-1));
    idx=Math.max(0,Math.min(m.n-1,idx));
    redrawChart(cv, ser, color, idx);
  });
  cv.addEventListener('mouseleave', ()=>redrawChart(cv, ser, color, -1));
}
function redrawAllCharts(){ CHARTS.forEach(c=>redrawChart(c.cv, c.ser, c.color, -1)); }

function redrawChart(cv, ser, color, hoverIdx){
  color = color||'#c89468';
  const full = (ser&&ser.points)||[];
  const points = full.slice(-CHART_MONTHS);
  const dpr = window.devicePixelRatio||1;
  const W = cv.clientWidth, H = cv.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx = cv.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);
  ctx.textBaseline='alphabetic';
  if(points.length<2){ctx.fillStyle='#8a7a68';ctx.font='12px sans-serif';ctx.fillText('데이터 없음',12,24);cv._meta={n:0};return;}
  const vals = points.map(p=>p.v);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){mn-=1;mx+=1;}
  const pad=(mx-mn)*0.14; mn-=pad; mx+=pad;
  const padL=46, padR=10, padT=10, padB=18;
  const n=points.length;
  const x=i=>padL+(W-padL-padR)*i/(n-1);
  const y=v=>padT+(H-padT-padB)*(1-(v-mn)/(mx-mn));
  // 추세 음영(최근 15개월, 보이는 구간 안에서)
  const shadeN=Math.min(15, n-1);
  ctx.fillStyle='rgba(200,148,104,0.12)';
  ctx.fillRect(x(n-1-shadeN),padT,x(n-1)-x(n-1-shadeN),H-padT-padB);
  // 0선
  if(mn<0&&mx>0){ctx.strokeStyle='#3a2f26';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,y(0));ctx.lineTo(W-padR,y(0));ctx.stroke();}
  // y축 라벨
  ctx.fillStyle='#8a7a68';ctx.font='10px sans-serif';ctx.textAlign='right';
  [mx-pad,(mn+mx)/2,mn+pad].forEach(v=>{ctx.fillText(v.toFixed(Math.abs(v)>=100?0:1),padL-5,y(v)+3);});
  // x축 연도
  ctx.textAlign='center';
  let lastYr=null;
  points.forEach((p,i)=>{const yr=p.d.slice(0,4); if(yr!==lastYr){ if(n<=24 || i%12<1){ctx.fillText("'"+yr.slice(2),x(i),H-5);} lastYr=yr; }});
  // 라인
  ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.beginPath();
  points.forEach((p,i)=>{i?ctx.lineTo(x(i),y(p.v)):ctx.moveTo(x(i),y(p.v));});ctx.stroke();
  // 마지막 점 + 값
  const lp=points[n-1];
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(x(n-1),y(lp.v),3,0,7);ctx.fill();
  cv._meta={padL,padR,W,H,n,mn,mx,pts:points,xfn:x,yfn:y};
  // 마우스 위치 크로스헤어 + 값 툴팁
  if(hoverIdx>=0 && hoverIdx<n){
    const hp=points[hoverIdx], hx=x(hoverIdx), hy=y(hp.v);
    ctx.strokeStyle='rgba(242,235,224,0.22)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(hx,padT);ctx.lineTo(hx,H-padB);ctx.stroke();
    ctx.fillStyle='#f2ebe0';ctx.beginPath();ctx.arc(hx,hy,3.5,0,7);ctx.fill();
    const label=hp.d+'  '+fmtVal(hp.v,ser);
    ctx.font='11px sans-serif'; const tw=ctx.measureText(label).width+12;
    let bx=hx+8; if(bx+tw>W-2) bx=hx-8-tw;
    ctx.fillStyle='rgba(21,16,9,0.95)';ctx.strokeStyle='#3a2f26';
    ctx.fillRect(bx,padT+2,tw,18);ctx.strokeRect(bx,padT+2,tw,18);
    ctx.fillStyle='#e8dcc8';ctx.textAlign='left';ctx.fillText(label,bx+6,padT+15);
  }
}

// ---------- 보조 의견 엔진(JS) : 입력형 지표(ISM 등) 참고 의견 계산 (build.py 로직의 JS 포팅) ----------
function linregSlope(ys){ const n=ys.length; if(n<2)return 0; let mx=0,my=0; for(let i=0;i<n;i++){mx+=i;my+=ys[i];} mx/=n;my/=n;
  let num=0,den=0; for(let i=0;i<n;i++){num+=(i-mx)*(ys[i]-my); den+=(i-mx)*(i-mx);} return num/(den||1e-9); }
function metricsJS(points){
  const vals=points.map(p=>p.v), n=vals.length; if(!n) return null;
  const w5=vals.slice(-60), rng=(Math.max(...w5)-Math.min(...w5))||1e-9;
  const win=vals.slice(-13), last=vals[n-1];
  const chgWin=win[win.length-1]-win[0];
  const chg6=n>=7?last-vals[n-7]:last-vals[0];
  const chg3=n>=4?last-vals[n-4]:last-vals[0];
  const pct=(last-Math.min(...w5))/rng*100;
  let imin=0,imax=0; win.forEach((v,i)=>{if(v<win[imin])imin=i; if(v>win[imax])imax=i;});
  return {last,rng,slope:linregSlope(win),chgWin,chg6,chg3,pct,
          iminFromEnd:win.length-1-imin, relWin:chgWin/rng, rel6:chg6/rng};
}
function suggestGeneric(qtypes, m, unit){
  if(!m) return {verdict:'수동',basis:'데이터 부족'};
  const votes=[]; const add=(l,r)=>votes.push([l,r]);
  for(const t of qtypes){
    if(t==='uptrend'){ if(m.relWin>0.12&&m.chg6>0)add(2,'상승 추세 뚜렷'); else if(m.relWin>0.04)add(1,'완만한 상승'); else add(0,'상승 추세 아님'); }
    else if(t==='downtrend'){ if(m.relWin<-0.12&&m.chg6<0)add(2,'하락 추세 뚜렷'); else if(m.relWin<-0.04)add(1,'완만한 하락'); else add(0,'하락 추세 아님'); }
    else if(t==='peak'){ if(m.pct>=72&&m.chg3<=0)add(2,'고점권 & 꺾임'); else if(m.pct>=72)add(1,'고점권이나 아직 상승'); else add(0,`고점권 아님(백분위 ${m.pct.toFixed(0)}%)`); }
    else if(t==='trough'){ if(m.pct<=28)add(2,'바닥권'); else if(m.pct<=42)add(1,'바닥 근접'); else add(0,`바닥권 아님(백분위 ${m.pct.toFixed(0)}%)`); }
    else if(t==='rebound'){ if(m.iminFromEnd>=2&&m.chg3>0)add(2,'저점 이후 반등 중'); else if(m.chg3>0)add(1,'단기 반등 신호'); else add(0,'반등 미확인'); }
    else if(t==='low_level'){ if(m.pct<=32)add(2,'낮은 수준'); else if(m.pct<=45)add(1,'다소 낮음'); else add(0,'낮은 수준 아님'); }
    else if(t==='high_level'){ if(m.pct>=68)add(2,'높은 수준'); else if(m.pct>=55)add(1,'다소 높음'); else add(0,'높은 수준 아님'); }
  }
  const base=`기울기 ${m.slope>=0?'+':''}${m.slope.toFixed(3)}, 6개월 ${m.chg6>=0?'+':''}${m.chg6.toFixed(1)}, 5년 백분위 ${m.pct.toFixed(0)}%`;
  if(!votes.length) return {verdict:'애매',basis:base};
  const v=Math.max(...votes.map(x=>x[0]));
  const verdict={2:'그렇다',1:'애매',0:'아니다'}[v];
  const reasons=votes.filter(x=>x[0]===v).map(x=>x[1]).join('; ');
  return {verdict, basis:reasons+'  ('+base+')'};
}
// ISM: STORE.ism({ym:값}) → 시계열 + 4문항 참고의견 갱신
function ismPoints(){ return Object.keys(STORE.ism||{}).sort().map(d=>({d, v:Number(STORE.ism[d])})).filter(p=>!isNaN(p.v)); }
function updateIsmSuggestions(){
  const pts=ismPoints(); const m=pts.length>=2?metricsJS(pts):null;
  APP_DATA.questions.forEach(q=>{ if(q.indicator_id==='ism'){
    q.suggest = m ? suggestGeneric(q.qtypes, m, '') : {verdict:'수동', basis:'ISM 값을 입력하면 자동 참고의견이 계산됩니다.'};
  }});
}

// 지표별 문항 그룹
function questionsByIndicator(){
  const g={};
  APP_DATA.indicators.forEach(ind=>g[ind.id]=[]);
  APP_DATA.questions.forEach(q=>{(g[q.indicator_id]=g[q.indicator_id]||[]).push(q);});
  Object.values(g).forEach(arr=>arr.sort((a,b)=>PH_ORDER.indexOf(a.phase)-PH_ORDER.indexOf(b.phase)));
  return g;
}

// ---------- 집계 ----------
function aggregate(checks){
  const raw={}; PH_ORDER.forEach(p=>raw[p]=0);
  APP_DATA.questions.forEach(q=>{ if(checks[q.seq]) raw[q.phase]+=q.weight; });
  const nb={};
  PH_ORDER.forEach((p,i)=>{
    const prev=PH_ORDER[(i+3)%4], next=PH_ORDER[(i+1)%4];
    nb[p]=raw[p]+0.5*raw[prev]+0.5*raw[next];
  });
  const sum=PH_ORDER.reduce((a,p)=>a+nb[p],0)||1;
  const prob={}; PH_ORDER.forEach(p=>prob[p]=nb[p]/sum*100);
  let top=PH_ORDER[0]; PH_ORDER.forEach(p=>{if(nb[p]>nb[top])top=p;});
  return {raw,nb,prob,top,sum};
}

// 내가 뒤집은 판단(참고의견 '그렇다'인데 체크 안함 / '아니다·애매'인데 체크함)
function disagreements(checks){
  const out=[];
  APP_DATA.questions.forEach(q=>{
    const sug=q.suggest||{}; const checked=!!checks[q.seq];
    if(sug.verdict==='수동') return;
    const suggested = sug.verdict==='그렇다';
    if(checked!==suggested){
      out.push({seq:q.seq, indicator:q.indicator_name, phase:q.phase, text:q.text,
                verdict:sug.verdict, checked, basis:sug.basis||''});
    }
  });
  return out;
}

    box.appendChild(tip);
    // 차트 or 수동
    if(ind.id==='ism'){
      // 입력값이 2개 이상이면 미니 차트
      if(ser.points.length>=2){ const cv=ce('canvas'); box.appendChild(cv); setTimeout(()=>setupChart(cv, ser, '#cfa75e'),0); }
      const links=(MANUAL_LINKS.ism||[]).map(l=>`<a href="${l.url}" target="_blank" rel="noopener" class="srcbtn">${l.name}</a>`).join('');

        + `<div class="ismrow"><b>${curMonth}</b> ISM PMI:
            <input type="number" step="0.1" id="ismInput" value="${cur}" placeholder="예: 54.0" style="width:90px">
            <button class="btn" id="ismSave">값 저장</button></div>`
        + (links?`<div class="srcrow">${links}</div>`:'')));
    }else if(ser.manual){
      const links=(MANUAL_LINKS[ind.id]||[]).map(l=>`<a href="${l.url}" target="_blank" rel="noopener" class="srcbtn">${l.name}</a>`).join('');
      box.appendChild(ce('div','manual-note',`<b>수동 확인 지표</b> — 무료 데이터 없음. 직접 확인 후 체크하세요.`+(links?`<div class="srcrow">${links}</div>`:'')));
    }else{
      const cv=ce('canvas'); box.appendChild(cv);

  });

  side.appendChild(renderAgg());

  recompute();
}

function renderAgg(){

}
function recompute(){
  const ag=aggregate(CHECKS);
  const cli=APP_DATA.cli||{};
  const body=$('#aggBody'); if(!body) return;
  let probHtml='<div class="big-prob">';
  PH_ORDER.forEach(p=>{ probHtml+=`<div class="pp"><div class="n pname ${p}">${ag.prob[p].toFixed(0)}%</div><div class="l">${p}</div></div>`; });
  probHtml+='</div>';
  let rows='<div class="scoregrid"><div class="hd">국면</div><div class="hd">원점수</div><div class="hd">이웃가중</div><div class="hd">확률</div>';
  PH_ORDER.forEach(p=>{
    rows+=`<div class="pname ${p}">${p}</div><div class="mono">${ag.raw[p]}</div><div class="mono">${ag.nb[p].toFixed(1)}</div><div class="mono">${ag.prob[p].toFixed(1)}%</div>`;
  });
  rows+='</div>';
  // CLI 비교
  const match = cli.phase ? (cli.phase===ag.top) : null;
  let cliHtml='';
  if(cli.phase){
    cliHtml=`<div class="cli-box">내 판단 최다국면: <b class="pname ${ag.top}">${ag.top}</b><br>
      OECD 경기선행지수(CLI) 국면: <b class="pname ${cli.phase}">${cli.phase}</b> <span class="muted">(지수 ${cli.level??'-'}, ${cli.rising?'상승':'하락'})</span><br>
      ${match?'<span class="match-ok">✔ 일치</span>':'<span class="match-no">✘ 불일치 — 공부할 지점</span>'}</div>`;
  }else{
    cliHtml='<div class="cli-box muted">CLI 데이터 없음</div>';
  }
  // 분류별(6개 카테고리) 원점수 — 엑셀 '결과 확인' 시트와 동일
  const catSc={}; CAT_ORDER.forEach(c=>catSc[c]={침체:0,회복:0,확장:0,둔화:0});
  APP_DATA.questions.forEach(q=>{ if(CHECKS[q.seq] && catSc[q.category]) catSc[q.category][q.phase]+=q.weight; });
  let catRows='';
  CAT_ORDER.forEach(c=>{ catRows+=`<tr><td class="l">${c}</td>`+
    PH_ORDER.map(p=>`<td class="mono">${catSc[c][p]||''}</td>`).join('')+'</tr>'; });
  const catHtml=`<details class="catbox"><summary>분류별 점수 (엑셀과 동일)</summary>
    <table class="cattbl"><tr><th class="l">분류</th>${PH_ORDER.map(p=>`<th class="pname ${p}">${p}</th>`).join('')}</tr>
    ${catRows}
    <tr class="tot"><td class="l">합계</td>${PH_ORDER.map(p=>`<td class="mono">${ag.raw[p]}</td>`).join('')}</tr></table></details>`;

  const dis=disagreements(CHECKS);
  body.innerHTML=probHtml+rows+cliHtml+catHtml+
    `<div class="foottip">이웃가중: 각 국면 + 0.5×양옆(침체↔회복↔확장↔둔화 원형). 확률=이웃가중/합계.</div>
     <div class="foottip">내가 참고의견과 다르게 본 문항: <b>${dis.length}</b>개 (저장 시 기록)</div>`;
  // 차트 위 disagree 표시
  $$('.q').forEach(el=>{
    const q=QMAP[el.dataset.seq]; const sug=q.suggest||{};
    const checked=$('input',el).checked;
    const dg = sug.verdict!=='수동' && (checked!==(sug.verdict==='그렇다'));
    el.classList.toggle('disagree',dg);
  });
}

function bindCheckEvents(root){
  root.addEventListener('change',e=>{
    if(e.target.matches('.q input[type=checkbox]')){
      const seq=+e.target.closest('.q').dataset.seq;
      CHECKS[seq]=e.target.checked; saveDraft(); recompute();
    }
  });
  root.addEventListener('click',e=>{
    if(e.target.matches('.info')){ $('#tip-'+e.target.dataset.tip).classList.toggle('show'); }
    if(e.target.id==='ismSave'){
      const v=($('#ismInput').value||'').trim();
      STORE.ism=STORE.ism||{};
      if(v==='') delete STORE.ism[curMonth]; else STORE.ism[curMonth]=Number(v);
      persistStore().then(ok=>{ updateIsmSuggestions(); renderCheck(); recompute(); toast(ok?'ISM 값 저장·동기화':'ISM 값 이 기기에 저장'); });
    }
  });
  $('#ym').addEventListener('change',e=>{ curMonth=e.target.value; loadDraftOrRecord(); });
  $('#fillSug').addEventListener('click',()=>{
    APP_DATA.questions.forEach(q=>{ if((q.suggest||{}).verdict==='그렇다') CHECKS[q.seq]=true; });
    syncChecks(); saveDraft(); recompute();
  });
  $('#clearAll').addEventListener('click',()=>{ CHECKS={}; syncChecks(); saveDraft(); recompute(); });
  $('#save').addEventListener('click',saveRecord);
  const per=$('#period');
  if(per) per.addEventListener('click',e=>{
    if(e.target.matches('.pbtn')){
      CHART_MONTHS=+e.target.dataset.m;
      $$('.pbtn',per).forEach(b=>b.classList.toggle('on',b===e.target));
      redrawAllCharts();
    }
  });
}
function syncChecks(){ $$('.q').forEach(el=>{const seq=+el.dataset.seq; $('input',el).checked=!!CHECKS[seq];}); }

// 드래프트(localStorage) — 유실 방지용 임시저장
function draftKey(){return 'cyc_draft_'+curMonth;}
function saveDraft(){ try{localStorage.setItem(draftKey(),JSON.stringify(CHECKS));}catch(e){} }
async function loadDraftOrRecord(){
  // 저장된 기록 우선, 없으면 임시 드래프트
  const rec = STORE.records[curMonth];
  if(rec && rec.checks){ CHECKS={...rec.checks}; }
  else{ try{ CHECKS=JSON.parse(localStorage.getItem(draftKey())||'{}'); }catch(e){ CHECKS={}; } }
  syncChecks(); recompute();
}

async function saveRecord(){
  const ag=aggregate(CHECKS);
  const dis=disagreements(CHECKS).map(d=>({...d,memo:''}));
  const rec={ ym:curMonth, asof:APP_DATA.asof, built_at:APP_DATA.built_at,
    checks:CHECKS, scores:{raw:ag.raw,neighbor:ag.nb,prob:ag.prob}, top:ag.top,
    cli_phase:(APP_DATA.cli||{}).phase||null, cli_level:(APP_DATA.cli||{}).level??null,
    cli_match:(APP_DATA.cli||{}).phase? ((APP_DATA.cli||{}).phase===ag.top):null,
    disagrees:dis, saved_at:new Date().toISOString() };
  STORE.records[curMonth]=rec;
  const ok=await persistStore();
  toast(ok ? `저장·동기화 완료 (${curMonth})` : `이 기기에 저장됨 (${curMonth}) — 온라인되면 자동 동기화 안 됨, 동기화 버튼 확인`);
}
function toast(msg){
  const t=ce('div',null,msg);
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#c89468;color:#1a1512;padding:10px 16px;border-radius:8px;z-index:99;border:1px solid #d8a67e';
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

async function renderHist(){
  const root=$('#tab-hist'); root.innerHTML='<div class="seg"><h3>월별 국면 점수 추이</h3><div id="histBody" class="muted">불러오는 중…</div></div>';
  const records = STORE.records || {};
  const yms=Object.keys(records).sort();
  const body=$('#histBody');
  if(!yms.length){ body.innerHTML='저장된 기록이 없습니다. (월간 체크 탭에서 저장하세요)'; return; }
  body.innerHTML='';
  // 스택바: 국면별 원점수
  yms.forEach(ym=>{
    const r=records[ym]; const sc=(r.scores&&r.scores.raw)||{};
    const tot=PH_ORDER.reduce((a,p)=>a+(sc[p]||0),0)||1;
    const wrap=ce('div'); wrap.style.marginBottom='12px';
    let segs='';
    PH_ORDER.forEach(p=>{ const w=(sc[p]||0)/tot*100; segs+=`<span title="${p} ${sc[p]||0}점" style="width:${w}%;background:${phaseColor(p)}"></span>`; });
    const match=r.cli_match;
    const flag = match===false ? `<span class="match-no" title="CLI(${r.cli_phase})와 불일치">✘ ${r.cli_phase}</span>`
               : match===true ? `<span class="match-ok">✔ ${r.cli_phase}</span>` : '<span class="muted">-</span>';
    wrap.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
        <span><b>${ym}</b> · 최다 <span class="pname ${r.top}">${r.top||'-'}</span></span>
        <span>CLI ${flag} · 뒤집은 판단 ${ (r.disagrees||[]).length }개</span></div>
      <div class="hist-bar">${segs}</div>`;
    if(match===false) wrap.style.outline='1px solid #c97a6255', wrap.style.outlineOffset='3px', wrap.style.borderRadius='4px';
    body.appendChild(wrap);
  });
  // 범례
  const lg=ce('div'); lg.style.cssText='margin-top:10px;font-size:12px';
  lg.innerHTML=PH_ORDER.map(p=>`<span class="pill" style="border-color:${phaseColor(p)};color:${phaseColor(p)}">${p}</span>`).join(' ');
  body.appendChild(lg);
  // 내가 뒤집은 판단
  const dseg=ce('div','seg'); dseg.innerHTML='<h3>내가 뒤집은 판단 (참고의견과 다르게 본 문항)</h3>';
  const dbody=ce('div','disg-list');
  let any=false;
  yms.slice().reverse().forEach(ym=>{
    const r=records[ym]; const ds=r.disagrees||[]; if(!ds.length) return; any=true;
    const h=ce('div'); h.innerHTML=`<div style="margin:8px 0 4px"><b>${ym}</b></div>`;
    ds.forEach(d=>{
      h.appendChild(ce('div','disg-item',
        `<span class="phase-chip" style="background:${phaseColor(d.phase)}22;color:${phaseColor(d.phase)}">${d.phase}</span>
         <b>${d.indicator}</b> — ${d.text}<br>
         <span class="muted">참고의견 <b class="v ${d.verdict}">${d.verdict}</b> / 내 체크 <b>${d.checked?'O':'X'}</b>${d.memo?(' · 메모: '+d.memo):''}</span>`));
    });
    dbody.appendChild(h);
  });
  if(!any) dbody.innerHTML='<span class="muted">아직 없음.</span>';
  dseg.appendChild(dbody); root.appendChild(dseg);
}
function collectLocalDrafts(){
  // file:// 폴백: localStorage 드래프트로 최소한의 히스토리
  const out={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
    if(k.startsWith('cyc_draft_')){const ym=k.slice(10); try{const ch=JSON.parse(localStorage.getItem(k));
      const ag=aggregate(ch); out[ym]={ym,scores:{raw:ag.raw},top:ag.top,disagrees:disagreements(ch),cli_match:null};}catch(e){}}}
  return out;
}

    <div style="margin:6px 0;color:#cfa75e"><b>조기 신호:</b> ${(s.signal||'').replace(/\n/g,'<br>')}</div>

async function saveScenario(){
  const key=$('#scn_key').value.trim(), body=$('#scn_body').value.trim(), signal=$('#scn_signal').value.trim();

  const chains=$$('#chains input').map(i=>i.value.trim()).filter(Boolean);
  const now=new Date(); const created=now.toISOString().slice(0,10);

    html+=`<td class="mono exp" data-a="${a}"><b>${exp.toFixed(2)}%</b></td></tr>`;
  });
  html+='</table><div style="margin-top:10px"><button class="btn primary" id="saveAR">국면별 수익률 저장</button> <button class="btn" id="recalcAR">기대수익 재계산</button></div>';
  const wrap=ce('div'); wrap.innerHTML=html; root.appendChild(wrap);

  const recalc=()=>{
    assets.forEach(a=>{ let exp=0;
      PH_ORDER.forEach(p=>{ const inp=$(`input[data-a="${CSS.escape(a)}"][data-p="${p}"]`); exp+=(Number(inp.value)||0)*ag.prob[p]/100; });
      $(`.exp[data-a="${CSS.escape(a)}"]`).innerHTML='<b>'+exp.toFixed(2)+'%</b>';
    });
  };
  $('#recalcAR').onclick=recalc;
  wrap.addEventListener('input',e=>{ if(e.target.matches('input[data-a]')) recalc(); });
  $('#saveAR').onclick=async()=>{
    const returns={}; PH_ORDER.forEach(p=>returns[p]={});
    $$('input[data-a]').forEach(i=>{ const v=i.value.trim(); if(v!=='') returns[i.dataset.p][i.dataset.a]=Number(v); });
    const newAR={...ar,returns};
    STORE.asset_returns=newAR;
    const ok=await persistStore();
    toast(ok?'국면별 수익률 저장·동기화 완료':'이 기기에 저장됨 (동기화 안 됨)');
  };
}

/* ============ 탭 전환 ============ */
function switchTab(name){
  $$('.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===name));
  ['check','hist','scn','asset'].forEach(t=>$('#tab-'+t).style.display=(t===name?'':'none'));
  if(location.hash.slice(1)!==name) history.replaceState(null,'','#'+name);
  if(name==='hist') renderHist();
  if(name==='scn') renderScn();
  if(name==='asset') renderAsset();
}
$$('.tabs button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));

/* ============ 초기화 ============ */
$('#syncBtn').onclick=openSyncUI;
(async function init(){
  $('#asof').textContent='데이터 '+APP_DATA.asof;
  await initStore();
  updateIsmSuggestions();
  renderCheck();
  await loadDraftOrRecord();
  const h=location.hash.slice(1);
  if(['hist','scn','asset'].includes(h)) switchTab(h);
})();
</script>
